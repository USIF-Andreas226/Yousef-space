<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="YMI Saturn logo">
    <defs>
        <radialGradient id="ymiPlanet" cx="38%" cy="32%" r="80%">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="50%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#5b21b6"/>
        </radialGradient>
        <linearGradient id="ymiRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#06B6D4"/>
            <stop offset="60%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#FBBF24"/>
        </linearGradient>
        <filter id="ymiGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="3.2" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Saturn ring drawn as a gear/cog to imply "tools" -->
    <g transform="rotate(-22 60 60)" filter="url(#ymiGlow)">
        <ellipse cx="60" cy="60" rx="50" ry="15" fill="none" stroke="url(#ymiRing)" stroke-width="6.5"/>
        <ellipse cx="60" cy="60" rx="50" ry="15" fill="none" stroke="url(#ymiRing)" stroke-width="3"
                 stroke-dasharray="3.5 5" opacity="0.9"/>
    </g>

    <!-- Planet -->
    <circle cx="60" cy="60" r="29" fill="url(#ymiPlanet)"/>

    <!-- YMI monogram -->
    <text x="60" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif"
          font-weight="800" font-size="19" fill="#ffffff" letter-spacing="0.5">YMI</text>
</svg>
